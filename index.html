<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TALKCRAB Dashboard — Protected</title>
<style>
  :root{
    --bg:#f5f4f0;--surface:#ffffff;--text:#1c1c1a;--text-2:#67665f;--text-3:#9b9a92;
    --border:rgba(0,0,0,0.10);--blue:#185FA5;--blue-d:#0C447C;--red:#A32D2D;
    --radius:14px;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#1a1a18;--surface:#242421;--text:#f0efe9;--text-2:#a8a79f;--text-3:#74736c;--border:rgba(255,255,255,0.12);--blue:#378ADD;--blue-d:#9EC9F4;}
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;-webkit-font-smoothing:antialiased;}
  .gate{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:34px 30px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.06);text-align:center;}
  .logo{width:54px;height:54px;border-radius:14px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
  h1{font-size:18px;font-weight:600;margin:0 0 4px;}
  .sub{font-size:13px;color:var(--text-2);margin:0 0 22px;}
  form{display:flex;flex-direction:column;gap:10px;}
  input{width:100%;height:44px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);padding:0 14px;font-size:15px;outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--blue);}
  button{height:44px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  button:hover{opacity:.9;} button:disabled{opacity:.55;cursor:default;}
  .err{font-size:12.5px;color:var(--red);min-height:16px;margin:2px 0 0;}
  .ft{font-size:11px;color:var(--text-3);margin-top:18px;line-height:1.6;}
  .lock{font-size:12px;color:var(--text-2);display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:18px;}
</style>
</head>
<body>
  <div class="gate">
    <div class="logo">🦀</div>
    <h1>TALKCRAB Dashboard</h1>
    <p class="sub">Sales report · May 2026</p>
    <div class="lock">🔒 Password protected</div>
    <form id="f" autocomplete="off">
      <input id="pw" type="password" placeholder="Enter password" autocomplete="current-password" autofocus>
      <button id="btn" type="submit">Unlock</button>
      <p class="err" id="err"></p>
    </form>
    <p class="ft">Content is encrypted (AES-256). The dashboard is decrypted in your browser only after the correct password is entered.</p>
  </div>

  function b64ToBytes(b64){var bin=atob(b64);var a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
  var f=document.getElementById('f'),pw=document.getElementById('pw'),err=document.getElementById('err'),btn=document.getElementById('btn');

  f.addEventListener('submit',function(e){
    e.preventDefault();
    err.textContent='';btn.disabled=true;btn.textContent='Unlocking…';
    unlock(pw.value).then(function(html){
      document.open();document.write(html);document.close();
    }).catch(function(){
      err.textContent='Incorrect password. Please try again.';
      btn.disabled=false;btn.textContent='Unlock';
      pw.value='';pw.focus();
    });
  });

  function unlock(password){
    var enc=new TextEncoder();
    var salt=b64ToBytes(CFG.salt), iv=b64ToBytes(CFG.iv), ct=b64ToBytes(CFG.ct);
    return crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveKey'])
      .then(function(base){
        return crypto.subtle.deriveKey(
          {name:'PBKDF2',salt:salt,iterations:CFG.iter,hash:'SHA-256'},
          base,{name:'AES-CBC',length:256},false,['decrypt']);
      })
      .then(function(key){
        return crypto.subtle.decrypt({name:'AES-CBC',iv:iv},key,ct);
      })
      .then(function(buf){
        var text=new TextDecoder().decode(new Uint8Array(buf));
        if(text.indexOf(CFG.magic)!==0){throw new Error('bad');}
        return text.slice(CFG.magic.length);
      });
  }
